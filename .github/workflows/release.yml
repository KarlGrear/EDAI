# Required GitHub secrets:
#   AZURE_CLIENT_ID              — App registration client ID
#   AZURE_TENANT_ID              — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID        — Azure subscription ID
#   AZURE_CODE_SIGNING_ACCOUNT_NAME  — Trusted Signing account name
#   AZURE_CODE_SIGNING_PROFILE_NAME  — Certificate profile name
#   AZURE_CODE_SIGNING_ENDPOINT      — Regional endpoint (e.g. https://eus.codesigning.azure.net)

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write   # create GitHub releases
  id-token: write   # OIDC federated identity for Azure login

jobs:
  release:
    runs-on: windows-latest
    environment: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs full tag history

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore EDAI.UI/EDAI.UI.csproj --runtime win-x64

      - name: Build
        run: dotnet build EDAI.UI/EDAI.UI.csproj --configuration Release --runtime win-x64 --no-restore

      - name: Publish (self-contained folder win-x64)
        run: >
          dotnet publish EDAI.UI/EDAI.UI.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish
          --no-restore

      - name: Resolve version via minver-cli
        id: get_version
        shell: bash
        run: |
          dotnet tool install --global minver-cli
          echo "version=$(minver)" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign executable (Azure Trusted Signing)
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CODE_SIGNING_PROFILE_NAME }}
          files-folder: ./publish
          files-folder-filter: exe
          files-folder-recurse: true

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId EDAI
          --packVersion ${{ steps.get_version.outputs.version }}
          --packDir ./publish
          --mainExe EDAI.UI.exe

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          BODY=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          BODY=$(echo "$BODY" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | sed '/./,$!d')
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](https://github.com/KarlGrear/EDAI/blob/main/CHANGELOG.md) for details."
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY"     >> "$GITHUB_OUTPUT"
          echo "EOF"       >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ./releases/EDAI-Setup.exe
            ./releases/*.nupkg
            ./releases/RELEASES
